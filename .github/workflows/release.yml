name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Установщик собираем ПЕРВЫМ — чтобы вложить его в пакет приложения.
      - name: Build installer (single-file exe)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet publish installer/Simryx.Setup/Simryx.Setup.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o installer-out
          if ($LASTEXITCODE -ne 0) { throw "installer publish failed: $LASTEXITCODE" }
          New-Item -ItemType Directory -Force -Path installer-dist | Out-Null
          Copy-Item installer-out/SimryxSetup.exe installer-dist/SimryxSetup.exe -Force

      - name: Build app (zip payload)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $numeric = ($version -split '-')[0]
          # Полностью автономная сборка: -r win-x64 + SelfContained (.NET рантайм),
          # а WindowsAppSDKSelfContained=true в .csproj докладывает Windows App SDK.
          #
          # ВАЖНО (версия): в Version кладём ПОЛНЫЙ semver с суффиксом (0.2.1-beta.1) —
          # он попадает в AssemblyInformationalVersion, который приложение показывает
          # в «О программе». AssemblyVersion/FileVersion обязаны быть числовыми ($numeric).
          dotnet build src/Simryx.App/Simryx.App.csproj `
            -c Release -p:Platform=x64 -r win-x64 -p:SelfContained=true `
            -p:Version=$version -p:FileVersion=$numeric -p:AssemblyVersion=$numeric `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -p:TreatWarningsAsErrors=false
          if ($LASTEXITCODE -ne 0) { throw "app build failed: $LASTEXITCODE" }
          # Находим папку с собранным exe (с RID путь вложен в win-x64).
          $buildRoot = "src/Simryx.App/bin/x64/Release"
          $exe = Get-ChildItem $buildRoot -Recurse -Filter "Simryx.App.exe" | Select-Object -First 1
          if (-not $exe) { throw "Simryx.App.exe not found under $buildRoot" }
          $outDir = $exe.Directory.FullName
          # Кладём свежий установщик ВНУТРЬ пакета — авто-обновление будет заменять
          # и SimryxSetup.exe (правильная тема окна обновления + актуальный деинсталлятор),
          # а не только само приложение.
          Copy-Item installer-dist/SimryxSetup.exe (Join-Path $outDir "SimryxSetup.exe") -Force
          New-Item -ItemType Directory -Force -Path publish | Out-Null
          Compress-Archive -Path "$outDir/*" `
            -DestinationPath "publish/Simryx.Hub.$version-win-x64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/*.zip
            installer-dist/SimryxSetup.exe
          generate_release_notes: true

      - name: Mark beta as pre-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // Стабильные теги (v0.2.1) остаются Latest. Теги с дефисом
            // (v0.2.1-beta.1, -rc.1 и т.п.) помечаем как Pre-release.
            if (!tag.includes('-')) return;
            const { owner, repo } = context.repo;
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: rel.data.id,
              prerelease: true,
              make_latest: 'false',
            });