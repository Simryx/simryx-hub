name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build and package
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart('v')
          $numeric = ($version -split '[-+]')[0]
          Write-Host "Tag=$tag  Version=$version  Numeric=$numeric"

          dotnet publish src/Simryx.App/Simryx.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:Version=$numeric `
            -p:FileVersion=$numeric `
            -p:AssemblyVersion=$numeric `
            -o publish/app

          New-Item -ItemType Directory -Force -Path publish | Out-Null
          $zip = "publish/Simryx.Hub.$version-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path publish/app/* -DestinationPath $zip
          Write-Host "Created $zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.zip
          generate_release_notes: true